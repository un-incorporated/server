; =========================================================================
; PgBouncer config — Unincorporated proxy stack sidecar
;
; Item A.2 of the round-1 overload-protection plan. See:
;   - FOLLOWUPS.md §"Proxy overload protection — round 1 audit findings"
;   - ARCHITECTURE.md §"Capacity & overload protection"
;
; Role: transaction-pooling reuse of real Postgres backends. The `uninc-proxy`
; Rust binary is a wire-protocol passthrough and cannot reuse Postgres
; sessions safely (connection state is per-session). PgBouncer handles the
; actual reuse, multiplexing multiple client sessions onto a smaller pool
; of real Postgres backends.
;
; Trust boundary: PgBouncer sits INSIDE the proxy trust boundary. A compromised
; PgBouncer is equivalent to a compromised proxy. Both are already assumed
; potentially hostile in the trust model, which is why the replicas exist as
; independent witnesses.
;
; Data path: client → uninc-proxy → pgbouncer → real postgres
; =========================================================================

[databases]
; Wildcard database entry — PgBouncer forwards to whatever database name
; the client requested, using the upstream host/port from the POSTGRES_UPSTREAM
; env var supplied at container startup. The startup wrapper script
; (startup-proxy.sh on GCP deployments, or a small entrypoint in local dev)
; rewrites this line from UPSTREAM env vars before PgBouncer starts.
* = host=UPSTREAM_HOST port=UPSTREAM_PORT

[pgbouncer]
; -------------------------------------------------------------------------
; Network
; -------------------------------------------------------------------------
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir =

; -------------------------------------------------------------------------
; Authentication
; -------------------------------------------------------------------------
; auth_file lists the credentials PgBouncer accepts from its clients
; (uninc-proxy is the only client). Generated by the startup script from
; the same db credentials uninc-proxy itself is configured with.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; -------------------------------------------------------------------------
; Pool sizing — the core overload-protection knobs
; -------------------------------------------------------------------------
; pool_mode = transaction
;   Multiple client sessions share a Postgres backend, with the backend
;   returning to the pool between transactions. Much higher reuse than
;   session-mode, but breaks features that depend on session state
;   (server-side cursors, LISTEN/NOTIFY, prepared statements at protocol
;   level, SET SESSION). Standard for web apps — the target buyer is a
;   web/API developer for whom this Just Works.
;
;   Customers who need session pooling (rare) must override via a separate
;   config. We document the tradeoff in uninc.yml.example.
pool_mode = transaction

; max_client_conn — hard cap on concurrent client connections (from
; uninc-proxy). Must be >= uninc-proxy's PoolConfig.max (item A.1). The
; default 200 leaves room for short queue waits.
max_client_conn = 200

; default_pool_size — maximum real Postgres backends per (database, user)
; pair. This is THE sizing knob. Postgres's max_connections (set in
; startup-db.sh Layer 4) must be >= default_pool_size + admin headroom.
default_pool_size = 25

; reserve_pool_size + reserve_pool_timeout — a small burst reserve that
; kicks in when default_pool_size is exhausted. Prevents the "one slow
; transaction starves all new arrivals" failure mode.
reserve_pool_size = 5
reserve_pool_timeout = 3

; Wait queue bound — if a client can't get a backend within this window,
; PgBouncer returns an error to uninc-proxy, which propagates it as a
; "too_many_connections" error to the customer's backend. Matches the
; default proxy connection_timeout_secs from item A.1.
query_wait_timeout = 5

; -------------------------------------------------------------------------
; Timeouts (backstops for item B)
; -------------------------------------------------------------------------
; server_lifetime — recycle a backend after this many seconds regardless
; of activity, to avoid long-lived leaks.
server_lifetime = 3600

; server_idle_timeout — close idle backends, returning capacity to other
; clients.
server_idle_timeout = 600

; server_connect_timeout — if the upstream Postgres is unreachable, fail
; fast rather than hanging on a TCP handshake. Feeds into uninc-proxy's
; error propagation.
server_connect_timeout = 10

; query_timeout — backstop for uninc-proxy's item-B query timeout. Matches
; the Postgres statement_timeout in startup-db.sh.
query_timeout = 30

; -------------------------------------------------------------------------
; Observability
; -------------------------------------------------------------------------
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid
admin_users = uninc
stats_users = uninc

; Log connection events at a level uninc's operator tooling can consume.
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

; -------------------------------------------------------------------------
; Safety
; -------------------------------------------------------------------------
; ignore_startup_parameters — we pass through application_name etc. from
; the customer backend without rejecting them.
ignore_startup_parameters = application_name,extra_float_digits,options

; server_reset_query — run this between transaction handoffs to clear any
; lingering session state. DISCARD ALL is the belt-and-suspenders default
; for transaction pooling.
server_reset_query = DISCARD ALL
